name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Mercurial (for SCM backend tests)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y mercurial
          hg --version

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@github.actions"
          git config --global user.name "GitHub Actions CI"

      - name: Build
        run: mise run build

      - name: Run tests
        run: mise run test

  quality:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: mise run fmt-check

      - name: Run clippy
        run: mise run lint

  test-scm:
    name: SCM Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Mercurial
        run: |
          sudo apt-get update
          sudo apt-get install -y mercurial
          hg --version

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@github.actions"
          git config --global user.name "GitHub Actions CI"

      - name: Run SCM backend tests (with Mercurial guard)
        run: mise run test-scm

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@github.actions"
          git config --global user.name "GitHub Actions CI"

      - name: Build and smoke-test release binary
        run: mise run e2e

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Mercurial (for SCM backend tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y mercurial

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@github.actions"
          git config --global user.name "GitHub Actions CI"

      - name: Generate coverage report
        run: mise run coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Run security audit
        run: mise run audit
